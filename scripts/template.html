<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日次ATLAS ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: #2a2a2e;
    --text: #e8e6e0;
    --text-muted: #7a7870;
    --text-dim: #4a4844;
    --accent: #c8a96e;
    --accent2: #7eb8a4;
    --accent3: #b87b6e;
    --signal: #4a7c6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .site-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header-meta {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* LAYOUT */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  /* SEARCH BAR */
  .search-section {
    padding: 2rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .search-row {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap::before {
    content: '検索';
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.75rem 1rem 0.75rem 3.5rem;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text-dim); font-size: 0.85rem; }

  .filter-wrap {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.4rem 0.8rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 500; }

  /* SEARCH RESULTS */
  #search-results {
    display: none;
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--border);
  }
  #search-results.visible { display: block; }
  .results-header {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }
  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0.75rem;
  }
  .article-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1rem 1.2rem;
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }
  .article-card:hover { border-color: var(--accent); }
  .article-card a {
    color: var(--text);
    text-decoration: none;
    font-size: 0.88rem;
    line-height: 1.5;
    display: block;
  }
  .article-card a:hover { color: var(--accent); }
  .article-meta {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.5rem;
    align-items: center;
  }
  .article-source {
    font-size: 0.68rem;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }
  .article-category-tag {
    font-size: 0.63rem;
    color: var(--accent2);
    border: 1px solid var(--signal);
    padding: 0.1rem 0.4rem;
    border-radius: 1px;
  }
  .article-date-tag {
    font-size: 0.63rem;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    margin-left: auto;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* MAIN LAYOUT */
  .main-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
    min-height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 2rem 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .sidebar-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0 1.5rem;
    margin-bottom: 0.75rem;
  }
  .date-list { list-style: none; margin-bottom: 2rem; }
  .date-list li {
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .date-list li.active { border-left-color: var(--accent); }
  .date-list li button {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 0.5rem 1.5rem 0.5rem 1.3rem;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.82rem;
    font-family: 'Space Mono', monospace;
    transition: color 0.15s;
  }
  .date-list li.active button { color: var(--accent); }
  .date-list li:hover button { color: var(--text); }
  .date-count {
    font-size: 0.65rem;
    color: var(--text-dim);
    display: block;
    margin-top: 0.1rem;
  }

  /* CONTENT */
  .content {
    padding: 2rem 2.5rem;
    overflow-y: auto;
  }

  /* DAY VIEW */
  .day-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }
  .day-date {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .day-total {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  /* SIGNALS */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }
  .signals-section { margin-bottom: 2rem; }
  .signal-list { list-style: none; }
  .signal-list li {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    color: var(--text);
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }
  .signal-list li::before {
    content: '▸';
    color: var(--accent2);
    font-size: 0.7rem;
    margin-top: 0.2rem;
    flex-shrink: 0;
  }

  /* CHANGE + INSIGHT */
  .text-sections {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .text-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.25rem 1.5rem;
  }
  .text-block.full { grid-column: 1 / -1; }
  .text-block p {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.8;
    white-space: pre-line;
  }

  /* CATEGORIES */
  .categories-section { margin-bottom: 2rem; }
  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .category-block {
    background: var(--bg);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .category-block:hover { background: var(--bg2); }
  .category-block.expanded { background: var(--bg2); }
  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .category-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
  }
  .category-name.cross { color: var(--accent2); }
  .category-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
  }
  .category-summary {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .category-block.expanded .category-summary {
    display: block;
    -webkit-line-clamp: unset;
  }
  .category-articles {
    display: none;
    margin-top: 1rem;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }
  .category-block.expanded .category-articles { display: block; }
  .cat-article-item {
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .cat-article-item:last-child { border-bottom: none; }
  .cat-article-item a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .cat-article-item a:hover { color: var(--accent); }
  .cat-article-source {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    margin-top: 0.1rem;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  /* NO RESULTS */
  .no-results {
    color: var(--text-dim);
    font-size: 0.85rem;
    padding: 1rem 0;
  }

  @media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .text-sections { grid-template-columns: 1fr; }
    .container { padding: 0 1rem; }
    .content { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">ATLAS — Daily Intelligence</div>
  <div class="header-meta" id="header-meta">loading...</div>
</header>

<div class="container">
  <div class="search-section">
    <div class="search-row">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="記事タイトル、キーワード、ソースで検索..." autocomplete="off">
      </div>
    </div>
    <div class="filter-wrap" id="category-filters" style="margin-top:0.75rem;"></div>
  </div>

  <div id="search-results">
    <div class="results-header" id="results-header"></div>
    <div class="article-grid" id="results-grid"></div>
  </div>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-label">Archive</div>
      <ul class="date-list" id="date-list"></ul>
    </aside>

    <main class="content" id="main-content">
      <div class="empty-state">データを読み込んでいます...</div>
    </main>
  </div>
</div>

<script>
// DATA_PLACEHOLDER
const ATLAS_DATA = [];

let allDays = [];
let currentDay = null;
let activeCategory = 'ALL';
let searchTimeout = null;

function init() {
  allDays = [...ATLAS_DATA].sort((a, b) => b.date.localeCompare(a.date));

  // Header meta
  document.getElementById('header-meta').textContent =
    `${allDays.length} days / ${allDays.reduce((s, d) => s + d.total_articles, 0)} articles`;

  // Build sidebar
  const dateList = document.getElementById('date-list');
  allDays.forEach((day, i) => {
    const li = document.createElement('li');
    if (i === 0) li.classList.add('active');
    const btn = document.createElement('button');
    btn.innerHTML = `${day.date}<span class="date-count">${day.total_articles} articles</span>`;
    btn.onclick = () => selectDay(day, li);
    li.appendChild(btn);
    dateList.appendChild(li);
  });

  // Build category filters (all unique categories)
  const cats = new Set(['ALL']);
  allDays.forEach(d => d.categories.forEach(c => cats.add(c.name)));
  const filterWrap = document.getElementById('category-filters');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'ALL' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => setCategory(cat, btn);
    filterWrap.appendChild(btn);
  });

  // Search
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => doSearch(e.target.value.trim()), 200);
  });

  // Show latest day
  if (allDays.length > 0) selectDay(allDays[0], dateList.querySelector('li'));
}

function selectDay(day, li) {
  currentDay = day;
  document.querySelectorAll('.date-list li').forEach(el => el.classList.remove('active'));
  if (li) li.classList.add('active');
  renderDay(day);
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const q = document.getElementById('search-input').value.trim();
  if (q) doSearch(q);
}

function doSearch(q) {
  const resultsEl = document.getElementById('search-results');
  const grid = document.getElementById('results-grid');
  const header = document.getElementById('results-header');

  if (!q) {
    resultsEl.classList.remove('visible');
    return;
  }

  const ql = q.toLowerCase();
  const results = [];

  allDays.forEach(day => {
    day.categories.forEach(cat => {
      if (activeCategory !== 'ALL' && cat.name !== activeCategory) return;
      cat.articles.forEach(art => {
        const match =
          art.title.toLowerCase().includes(ql) ||
          (art.source || '').toLowerCase().includes(ql) ||
          cat.summary.toLowerCase().includes(ql);
        if (match) results.push({ ...art, category: cat.name, date: day.date });
      });
    });
  });

  // Deduplicate by URL
  const seen = new Set();
  const deduped = results.filter(r => {
    if (seen.has(r.url)) return false;
    seen.add(r.url);
    return true;
  });

  header.textContent = `${deduped.length} results — "${q}"${activeCategory !== 'ALL' ? ` in ${activeCategory}` : ''}`;
  grid.innerHTML = '';

  if (deduped.length === 0) {
    grid.innerHTML = '<div class="no-results">該当する記事が見つかりませんでした</div>';
  } else {
    deduped.forEach(art => {
      const card = document.createElement('div');
      card.className = 'article-card';
      card.innerHTML = `
        <a href="${art.url}" target="_blank" rel="noopener">${art.title}</a>
        <div class="article-meta">
          <span class="article-source">${art.source || ''}</span>
          <span class="article-category-tag">${art.category}</span>
          <span class="article-date-tag">${art.date}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  resultsEl.classList.add('visible');
}

function renderDay(day) {
  const content = document.getElementById('main-content');

  const cats = day.categories.map(cat => `
    <div class="category-block" onclick="toggleCategory(this)">
      <div class="category-header">
        <span class="category-name${cat.is_cross ? ' cross' : ''}">${cat.name}${cat.is_cross ? ' ×' : ''}</span>
        <span class="category-count">${cat.count}</span>
      </div>
      <div class="category-summary">${cat.summary}</div>
      <div class="category-articles">
        ${cat.articles.map(a => `
          <div class="cat-article-item">
            <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
            <div class="cat-article-source">${a.source || ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  const signals = day.signals.map(s => `<li>${s}</li>`).join('');

  content.innerHTML = `
    <div class="day-header">
      <span class="day-date">${day.date}</span>
      <span class="day-total">${day.total_articles} articles</span>
    </div>

    <div class="signals-section">
      <div class="section-label">Signals</div>
      <ul class="signal-list">${signals}</ul>
    </div>

    <div class="text-sections">
      <div class="text-block">
        <div class="section-label">Change — 前日差分</div>
        <p>${day.change || '—'}</p>
      </div>
      <div class="text-block full">
        <div class="section-label">Insight — 総合考察</div>
        <p>${day.insight || '—'}</p>
      </div>
    </div>

    <div class="categories-section">
      <div class="section-label">Categories</div>
      <div class="categories-grid">${cats}</div>
    </div>
  `;
}

function toggleCategory(el) {
  el.classList.toggle('expanded');
}

// Load data
(function() {
  try {
    if (typeof ATLAS_DATA !== 'undefined' && ATLAS_DATA.length > 0) {
      init();
    } else {
      document.getElementById('main-content').innerHTML =
        '<div class="empty-state">atlas.jsonにデータがありません</div>';
    }
  } catch(e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
